<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudynic Chat - مجاني</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .chat-container { width: 100%; max-width: 500px; height: 80vh; background: var(--chat-bg); border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        
        .chat-header { background: var(--primary-color); color: white; padding: 20px; text-align: center; font-weight: bold; }
        
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .user-msg { align-self: flex-end; background: var(--primary-color); color: white; border-bottom-left-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #e5e7eb; color: #1f2937; border-bottom-right-radius: 2px; }

        .input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; background: #fff; }
        
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--primary-color); }
        
        button { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        #cooldown-msg { text-align: center; font-size: 12px; color: #ef4444; margin-bottom: 5px; display: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Cloudynic AI (Free Plan)</div>
    
    <div id="chat-box">
        <div class="message ai-msg">مرحباً! أنا جاهز للإجابة. تذكر أن الخطة المجانية تسمح برسالة واحدة كل دقيقة.</div>
    </div>

    <div id="cooldown-msg">يرجى الانتظار <span id="timer">60</span> ثانية قبل الإرسال مجدداً...</div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
    let canSend = true;
    let secondsLeft = 60;

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');
        const prompt = inputField.value.trim();

        if (!prompt || !canSend) return;

        // إضافة رسالة المستخدم للواجهة
        addMessage(prompt, 'user-msg');
        inputField.value = '';

        // تفعيل وضع الانتظار
        startCooldown();

        try {
            // إضافة رسالة "جاري التفكير"
            const loadingId = addMessage('جاري التفكير...', 'ai-msg');
            
            // طلب البيانات من الرابط
            const response = await fetch(`https://api.cloudynic.com{encodeURIComponent(prompt)}`);
            const text = await response.text();

            // تحديث رسالة التفكير بالرد الحقيقي
            updateMessage(loadingId, text);
        } catch (error) {
            addMessage("عذراً، حدث خطأ في الاتصال بالخادم.", 'ai-msg');
        }
    }

    function addMessage(text, className) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        const id = Date.now();
        msgDiv.id = id;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
    }

    function updateMessage(id, newText) {
        document.getElementById(id).innerText = newText;
    }

    function startCooldown() {
        canSend = false;
        secondsLeft = 60;
        const btn = document.getElementById('send-btn');
        const coolDownMsg = document.getElementById('cooldown-msg');
        const timerSpan = document.getElementById('timer');

        btn.disabled = true;
        coolDownMsg.style.display = 'block';

        const interval = setInterval(() => {
            secondsLeft--;
            timerSpan.innerText = secondsLeft;

            if (secondsLeft <= 0) {
                clearInterval(interval);
                canSend = true;
                btn.disabled = false;
                coolDownMsg.style.display = 'none';
            }
        }, 1000);
    }
</script>

</body>
</html>
